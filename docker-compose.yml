version: '3.8'
services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/app/frontend:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
